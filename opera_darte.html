<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOFIA APRILO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d1a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    color: #e0e0e0;
    text-align: center;
    padding: 40px 24px;
  }

  .dedicato {
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 48px;
  }

  .dedicato span {
    color: #c0a0e0;
    font-style: italic;
    letter-spacing: 2px;
  }

  .frase {
    font-size: clamp(1rem, 4vw, 1.5rem);
    color: #aaa;
    letter-spacing: 3px;
    font-style: italic;
    line-height: 2;
    margin-bottom: 16px;
  }

  .frase-grande {
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    font-weight: 700;
    font-style: normal;
    color: #a0e0a0;
    letter-spacing: 5px;
    text-shadow: 0 0 30px rgba(160, 224, 160, 0.4);
    line-height: 1.3;
    margin-bottom: 60px;
  }

  .firma {
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="dedicato">— fatto apposta per <span>te</span>, solo per te —</div>

  <div class="frase">.... E NON SONO GIOCHINI STUPIDI .....</div>
  <div class="frase-grande">SONO OPERE D'ARTE</div>

  <div class="firma">© Nicola · edizione unica · non riproducibile</div>

</body>
</html>
